<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingeniería de Fiabilidad | Grupo 4 ESPOCH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #030008;
            --card-bg: rgba(20, 10, 35, 0.7);
            --primary-purple: #7000ff;
            --neon-cyan: #00f2ff;
            --text-main: #f0f0f5;
            --text-dim: #a0a0b5;
            --glass-border: rgba(112, 0, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main); 
            line-height: 1.8; 
            overflow-x: hidden;
        }

        /* NAVEGACIÓN */
        header {
            background: rgba(3, 0, 8, 0.8);
            padding: 20px 8%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px);
        }
        .logo { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; display: flex; align-items: center; gap: 12px; }
        .logo span { background: linear-gradient(to right, var(--primary-purple), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* HERO SECTION */
        .hero { padding: 80px 5% 40px; text-align: center; }
        .hero h1 { 
            font-size: 4rem; margin-bottom: 20px; font-weight: 800; line-height: 1.1;
            background: linear-gradient(to bottom, #fff 40%, var(--primary-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p { font-size: 1.2rem; color: var(--text-dim); max-width: 800px; margin: 0 auto; }

        /* PANELES DE CONTENIDO */
        .glass-panel { 
            background: var(--card-bg); padding: 40px; border-radius: 24px; 
            border: 1px solid var(--glass-border); margin-bottom: 40px; text-align: justify;
        }
        .glass-panel h2 { color: var(--neon-cyan); margin-bottom: 20px; font-size: 2rem; display: flex; align-items: center; gap: 15px; }

        /* MATEMÁTICAS */
        .math-box { text-align: center; margin: 30px 0; padding: 30px; background: rgba(112, 0, 255, 0.05); border-radius: 16px; border: 1px solid var(--primary-purple); }
        .math-box code { font-family: 'JetBrains Mono', monospace; font-size: 2.4rem; color: var(--neon-cyan); }

        /* GRID MULTIMEDIA */
        .media-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px; margin-bottom: 40px; }
        .video-card { border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); background: #000; }
        video { width: 100%; display: block; }
        .qr-card { background: #fff; padding: 30px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #qrcode { margin-bottom: 15px; }
        .qr-card p { color: #000; font-weight: 800; font-size: 0.9rem; }

        /* ESTRUCTURA PERFECTA EN 3 COLUMNAS PARA EL SIMULADOR */
        .simulator-card { 
            background: linear-gradient(145deg, #0d0a1a, #030008);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            margin-bottom: 60px;
        }
        
        .sim-grid-3col { 
            display: grid; 
            grid-template-columns: 1fr 1.2fr 0.8fr; 
            gap: 30px; 
            align-items: stretch; 
        }
        
        @media (max-width: 1000px) { 
            .sim-grid-3col { grid-template-columns: 1fr; } 
        }

        /* COLUMNA 1: CONTROLES */
        .controls-side { display: flex; flex-direction: column; justify-content: center; }
        .input-item { margin-bottom: 20px; }
        .input-item label { color: var(--neon-cyan); font-weight: 700; margin-bottom: 8px; display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 14px; background: #0a0614; border: 1px solid var(--glass-border); 
            color: #fff; border-radius: 10px; font-size: 1rem; outline: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        input:focus, select:focus { border-color: var(--neon-cyan); }
        
        .btn-glow { 
            width: 100%; padding: 16px; background: var(--primary-purple); color: #fff; 
            border: none; border-radius: 10px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-glow:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* COLUMNA 2: GRÁFICA CENTRAL Y PORCENTAJE */
        .display-side {
            background: rgba(5, 2, 15, 0.6);
            border: 1px solid rgba(112, 0, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }
        #res-val { font-size: 4.5rem; font-weight: 900; color: var(--neon-cyan); line-height: 1; margin-bottom: 15px; display: block; }
        .chart-container { height: 200px; position: relative; width: 100%; }

        /* COLUMNA 3: PANEL RENDER 3D (TOTALMENTE INDEPENDIENTE A LA DERECHA) */
        .model-3d-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .model-3d-container {
            width: 100%;
            height: 100%;
            min-height: 280px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
            position: relative;
        }
        .model-3d-container img {
            max-width: 100%;
            max-height: 190px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        .model-label {
            position: absolute;
            bottom: 12px;
            font-size: 0.7rem;
            font-weight: 800;
            color: #030008;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(0, 242, 255, 0.3);
            padding: 3px 12px;
            border-radius: 6px;
        }

        /* FOOTER */
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid var(--glass-border); background: rgba(3, 0, 8, 0.9); }
        .badge-espoch { background: #ff3e3e; color: #fff; padding: 6px 18px; border-radius: 30px; font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-industry" style="color: var(--neon-cyan);"></i> <span>Reliability</span>Analytics</div>
        <div class="badge-espoch">GRUPO 4 - MECÁNICA</div>
    </header>

    <div class="container" style="margin-top: 40px;">
        
        <section class="simulator-card">
            <h2 style="color: var(--neon-cyan); text-align: center; margin-bottom: 35px; font-size: 2rem;">Simulador de Fiabilidad</h2>
            
            <div class="sim-grid-3col">
                
                <div class="controls-side">
                    <div class="input-item">
                        <label><i class="fas fa-database"></i> Activos Industriales (Base de Datos)</label>
                        <select id="asset_select" onchange="cargarDatosActivo()">
                            <option value="custom">-- Configuración Manual --</option>
                            <option value="motor">Motor Eléctrico Trifásico (IEEE 493) - MTBF: 12,000h</option>
                            <option value="bomba">Bomba Centrífuga de Procesos (OREDA) - MTBF: 7,400h</option>
                            <option value="compresor">Compresor de Tornillo Rotativo - MTBF: 5,500h</option>
                            <option value="turbina">Turbina de Vapor Crítica - MTBF: 22,000h</option>
                            <option value="reductor">Reductor de Velocidad - MTBF: 9,800h</option>
                        </select>
                    </div>
                    <div class="input-item">
                        <label>MTBF (Horas)</label>
                        <input type="number" id="inp_mtbf" value="8500">
                    </div>
                    <div class="input-item">
                        <label>Tiempo de Misión (Horas)</label>
                        <input type="number" id="inp_time" value="1200">
                    </div>
                    <button class="btn-glow" onclick="procesarCalculo()">Ejecutar Algoritmo</button>
                </div>
                
                <div class="display-side">
                    <div>
                        <p style="color: var(--text-dim); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 5px;">CONFIABILIDAD CALCULADA</p>
                        <span id="res-val">0%</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart_id"></canvas>
                    </div>
                </div>

                <div class="model-3d-side">
                    <div class="model-3d-container">
                        <img id="asset_img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/3D_Pump.svg/512px-3D_Pump.svg.png" alt="Render de Componente">
                        <span id="model_lbl" class="model-label">SISTEMA GENERAL</span>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <script>
        let mainChart;

        // Base de datos usando imágenes estables y optimizadas de servidores globales de desarrollo
        const baseDeDatosActivos = {
            custom: {
                mtbf: 8500, time: 1200, 
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/3D_Pump.svg/512px-3D_Pump.svg.png", 
                lbl: "CONFIGURACIÓN MANUAL"
            },
            motor: { 
                mtbf: 12000, time: 2000, 
                img: "https://images.unsplash.com/photo-1620714223084-8fcacc6dfd8d?q=80&w=400&auto=format&fit=crop", 
                lbl: "CAD 3D: MOTOR AC" 
            },
            bomba: { 
                mtbf: 7400, time: 1500, 
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Centrifugal_Pump.svg/512px-Centrifugal_Pump.svg.png", 
                lbl: "PLANO INDUSTRIAL: BOMBA" 
            },
            compresor: { 
                mtbf: 5500, time: 1000, 
                img: "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?q=80&w=400&auto=format&fit=crop", 
                lbl: "RENDER: COMPRESOR" 
            },
            turbina: { 
                mtbf: 22000, time: 5000, 
                img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Steam_turbine_3D_layout_cut.png/640px-Steam_turbine_3D_layout_cut.png", 
                lbl: "CORTE MECÁNICO: TURBINA" 
            },
            reductor: { 
                mtbf: 9800, time: 1500, 
                img: "https://images.unsplash.com/photo-1537462715879-360eeb61a0bc?q=80&w=400&auto=format&fit=crop", 
                lbl: "SISTEMA: ENGRANAJES" 
            }
        };

        function cargarDatosActivo() {
            const selector = document.getElementById('asset_select');
            const activoSeleccionado = selector.value;
            const datos = baseDeDatosActivos[activoSeleccionado];
            
            document.getElementById('inp_mtbf').value = datos.mtbf;
            document.getElementById('inp_time').value = datos.time;
            
            const imgElement = document.getElementById('asset_img');
            imgElement.style.opacity = 0;
            setTimeout(() => {
                imgElement.src = datos.img;
                document.getElementById('model_lbl').innerText = datos.lbl;
                imgElement.style.opacity = 1;
            }, 150);

            procesarCalculo(); 
        }

        function procesarCalculo() {
            const mtbf = parseFloat(document.getElementById('inp_mtbf').value);
            const t = parseFloat(document.getElementById('inp_time').value);
            
            if(!mtbf || mtbf <= 0 || !t || t <= 0) return;
            
            const lambda = 1 / mtbf;
            const r = Math.exp(-lambda * t);
            
            const num = document.getElementById('res-val');
            num.innerText = (r * 100).toFixed(1) + "%";
            
            if(r < 0.6) num.style.color = "#ff3e3e";
            else if(r < 0.85) num.style.color = "#ffa500";
            else num.style.color = "#00f2ff";

            updateVisuals(lambda, t);
        }

        function updateVisuals(lambda, tUser) {
            const ctx = document.getElementById('chart_id').getContext('2d');
            const labels = []; const points = []; const range = tUser * 2.5;

            for(let i=0; i <= range; i += range/20) {
                labels.push(Math.round(i));
                points.push((Math.exp(-lambda * i) * 100).toFixed(2));
            }

            if(mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: points,
                        borderColor: '#7000ff',
                        backgroundColor: 'rgba(112, 0, 255, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 0
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { ticks: { color: '#666', font: { size: 9 } }, grid: { display: false } },
                        y: { beginAtZero: true, max: 100, ticks: { color: '#666', font: { size: 9 } }, grid: { color: 'rgba(112,0,255,0.05)' } }
                    }
                }
            });
        }

        window.onload = () => {
            procesarCalculo();
        };
    </script>
</body>
</html>
